<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 会议记录助手</title>
<style>
  :root {
    --primary:#2563eb; --primary-light:#dbeafe; --primary-dark:#1d4ed8;
    --accent:#f59e0b; --accent-light:#fef3c7;
    --green:#10b981; --green-light:#d1fae5;
    --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb; --gray-300:#d1d5db;
    --gray-600:#4b5563; --gray-700:#374151; --gray-800:#1f2937; --gray-900:#111827;
    --radius:12px; --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
    --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--gray-800);background:var(--gray-50);line-height:1.7;min-height:100vh;display:flex;flex-direction:column;}
  .hero{padding:72px 24px 40px;text-align:center;}
  .hero h1{font-size:40px;font-weight:800;background:linear-gradient(135deg,var(--primary),#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .hero p{margin-top:14px;font-size:17px;color:var(--gray-600);max-width:560px;margin-inline:auto;}
  .badges{margin-top:20px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:6px 14px;border-radius:999px;background:var(--primary-light);color:var(--primary);}
  .cards{max-width:820px;margin:0 auto;padding:16px 24px 48px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
  .card{display:block;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);transition:box-shadow .2s,transform .2s;}
  .card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}
  .card .ico{font-size:32px;margin-bottom:10px;}
  .card h2{font-size:20px;font-weight:700;margin-bottom:6px;}
  .card p{font-size:14px;color:var(--gray-600);}
  .card .tags{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;}
  .tag-blue{background:var(--primary-light);color:var(--primary);}
  .tag-green{background:var(--green-light);color:#065f46;}
  .card .arrow{margin-top:14px;font-size:14px;font-weight:600;color:var(--primary);}
  .note{max-width:820px;margin:0 auto;padding:0 24px 48px;font-size:14px;color:var(--gray-600);text-align:center;}
  .footer{margin-top:auto;padding:24px;text-align:center;font-size:13px;color:var(--gray-300);border-top:1px solid var(--gray-200);}
  @media(max-width:600px){.hero h1{font-size:30px;}.hero p{font-size:15px;}}
</style>
</head>
<body>

<section class="hero">
  <h1>AI 会议记录助手</h1>
  <p>把会议录音 / 转录文本自动转成正式会议纪要 Word 文档。选择你使用的工具查看对应手册：</p>
  <div class="badges">
    <span class="badge">🎙️ 录音转纪要</span>
    <span class="badge">📝 自动书面化</span>
    <span class="badge">🔍 来源可溯</span>
  </div>
</section>

<div class="cards">
  <a class="card" href="guidebook/manual-claude.html">
    <div class="ico">💻</div>
    <h2>Claude Code 版</h2>
    <p>命令行使用，功能全、可自定义模型、处理较快。适合愿意用命令行、要批量或接流水线的用户。</p>
    <div class="tags"><span class="tag tag-blue">命令行</span><span class="tag tag-blue">自定义模型</span></div>
    <div class="arrow">查看手册 →</div>
  </a>
  <a class="card" href="guidebook/manual-workbuddy.html">
    <div class="ico">💬</div>
    <h2>Workbuddy 版</h2>
    <p>腾讯客户端，对话框操作，微信扫码即用。适合不想碰命令行、要开箱即用的用户。</p>
    <div class="tags"><span class="tag tag-green">对话框</span><span class="tag tag-green">简单易用</span></div>
    <div class="arrow">查看手册 →</div>
  </a>
</div>

<div class="note">
  技能与源码：<a href="https://github.com/ricym/AI-meetings-cpcec" target="_blank">github.com/ricym/AI-meetings-cpcec</a>
</div>

<footer class="footer"><p>AI 会议记录助手 · 2026</p></footer>

</body>
</html>
